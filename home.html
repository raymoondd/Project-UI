<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily Study & Routine Monitor</title>

    <link rel="stylesheet" href="home.css">

    <!-- Favicon (Best Practice Setup) -->
    <link rel="icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="main.png">
    <link rel="icon" type="image/png" sizes="32x32" href="main.png">
    <link rel="icon" type="image/png" sizes="48x48" href="main.png">

</head>

<body>
    <div class="app-container">
        <header class="dashboard">
            <div class="header-top">
                <div>
                    <h1 id="current-time">00:00:00</h1>
                    <p id="current-date">Loading date...</p>
                </div>
                <button id="theme-toggle" class="btn outline">🌙 Dark Mode</button>
            </div>

            <div class="quote-container">
                <p id="motivational-quote">"Focus on being productive instead of busy."</p>
            </div>
            
            <div class="progress-section">
                <div class="progress-stats">
                    <span>Task Progress</span>
                    <span id="task-fraction">0/0 Completed</span>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
            </div>
        </header>

        <main class="main-content">
            <section class="task-planner card">
                <h2>Add New Task</h2>
                <form id="task-form">
                    <div class="form-group">
                        <label for="task-title">Title</label>
                        <input type="text" id="task-title" required placeholder="E.g., Read Chapter 4">
                    </div>

                    <div class="form-group">
                        <label for="task-desc">Description (Optional)</label>
                        <input type="text" id="task-desc" placeholder="Brief details...">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="start-time">Start Time</label>
                            <input type="time" id="start-time" required>
                        </div>

                        <div class="form-group">
                            <label for="end-time">End Time</label>
                            <input type="time" id="end-time" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="task-category">Category</label>
                        <select id="task-category">
                            <option value="Study">Study</option>
                            <option value="Break">Break</option>
                            <option value="Personal">Personal</option>
                            <option value="Work">Work</option>
                        </select>
                    </div>

                    <button type="submit" class="btn primary">Add Task</button>
                </form>
            </section>

            <aside class="sidebar">
                <section class="pomodoro card">
                    <h2>Study Timer</h2>
                    <div class="timer-display" id="timer-display">25:00</div>
                    <p class="timer-status" id="timer-status">Study Session</p>

                    <div class="timer-controls">
                        <button id="timer-start" class="btn primary">Start</button>
                        <button id="timer-pause" class="btn outline">Pause</button>
                        <button id="timer-reset" class="btn outline">Reset</button>
                    </div>
                </section>

                <section class="timeline card">
                    <h2>Daily Timeline</h2>
                    <div id="timeline-container" class="timeline-container">
                    </div>
                </section>
            </aside>
        </main>
    </div>

    <div id="toast-container"></div>

    <script src="home.js"></script>
</body>
</html>
